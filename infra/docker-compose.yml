# Instance Convex self-host dédiée aux stats de tamdoku (« qui tape quoi »).
# Modèle repris des instances ultra-note / vigie sur cookie-server. Déployée
# sous /home/maxim/tamdoku-stats/infra/ avec son .env (voir .env.example).
#
#   docker compose up -d
#
# Le backend est joint par Caddy via le nom `tamdoku-convex-backend` sur le
# réseau caddy-net ; les HTTP actions (port 3211) sont exposées publiquement.

services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: tamdoku-convex-backend
    stop_grace_period: 10s
    stop_signal: SIGINT
    restart: unless-stopped
    ports:
      # bind localhost uniquement : accès CLI/deploy depuis l'hôte.
      # Caddy atteint le container par son nom via caddy-net, pas par ces ports.
      - "127.0.0.1:${PORT:-3240}:3210"
      - "127.0.0.1:${SITE_PROXY_PORT:-3241}:3211"
    volumes:
      - data:/convex/data
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME}
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3240}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN}
      - DISABLE_BEACON=true
      - REDACT_LOGS_TO_CLIENT=true
      - DOCUMENT_RETENTION_DELAY=${DOCUMENT_RETENTION_DELAY:-172800}
      - RUST_LOG=${RUST_LOG:-info}
    healthcheck:
      test: curl -f http://localhost:3210/version
      interval: 5s
      start_period: 10s
    networks:
      - caddy-net

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: tamdoku-convex-dashboard
    stop_grace_period: 10s
    stop_signal: SIGINT
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-6794}:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3240}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - caddy-net

volumes:
  data:

networks:
  caddy-net:
    external: true
