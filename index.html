    <style>
      /* Écran de chargement instantané (peint avant le bundle JS), dissous au démarrage.
         Pastilles aux couleurs des 5 lignes TaM : sans dépendance aux polices web. */
      html,
      body {
        background: #f4f1e9;
      }
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f1e9;
        transition: opacity 0.5s ease;
      }
      html.app-ready #preloader {
        opacity: 0;
        pointer-events: none;
      }
      #preloader .pl {
        display: flex;
        gap: 10px;
      }
      #preloader .pl i {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        animation: plb 1s ease-in-out infinite;
      }
      #preloader .pl i:nth-child(1) {
        background: #0059a2;
      }
      #preloader .pl i:nth-child(2) {
        background: #ef7d00;
        animation-delay: 0.12s;
      }
      #preloader .pl i:nth-child(3) {
        background: #c6d302;
        animation-delay: 0.24s;
      }
      #preloader .pl i:nth-child(4) {
        background: #4c2b0e;
        animation-delay: 0.36s;
      }
      #preloader .pl i:nth-child(5) {
        background: #287530;
        animation-delay: 0.48s;
      }
      @keyframes plb {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        50% {
          transform: translateY(-12px);
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #preloader .pl i {
          animation: plp 1.2s ease-in-out infinite;
        }
        @keyframes plp {
          0%,
          100% {
            opacity: 0.4;
          }
          50% {
            opacity: 1;
          }
        }
      }
    </style>
    <noscript><style>
        #preloader {
          display: none !important;
        }
      </style></noscript>

    <div id="preloader" aria-hidden="true">
      <div class="pl"><i></i><i></i><i></i><i></i><i></i></div>
    </div>
    <div id="root">
      <noscript>
        <h1>Tamdoku — le puzzle quotidien du tram de Montpellier</h1>
        <p>
          Tamdoku est un jeu de réflexion quotidien inspiré d'UbahnDoku, adapté au réseau de
          tramway de Montpellier (TaM). Chaque jour, une grille 3×3 : chaque ligne et chaque colonne
          porte un critère (une ligne de tram, un terminus, une correspondance, une lettre du nom…),
          et il faut remplir chaque case avec une station qui satisfait à la fois le critère de sa
          ligne et celui de sa colonne, sans jamais réutiliser une station.
        </p>
        <p>
          La grille est la même pour tout le monde et se renouvelle chaque nuit. Le jeu est gratuit
          et ne nécessite aucun compte. Il faut activer JavaScript pour jouer.
        </p>
      </noscript>
    </div>
